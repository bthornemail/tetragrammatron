name: ci-contract-integration

on:
  pull_request:
    paths:
      - 'src/core/**'
      - 'src/network/**'
      - 'src/protocol/**'
      - 'fixtures/demos/**'
      - 'tests/conformance/**'
      - 'docs/tracks/contract-map.md'
  push:
    paths:
      - 'src/core/**'
      - 'src/network/**'
      - 'src/protocol/**'
      - 'fixtures/demos/**'
      - 'tests/conformance/**'
      - 'docs/tracks/contract-map.md'

jobs:
  contract-integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20.x
      - run: npm test
      - run: npm run conformance
      - run: npm run demo:all
