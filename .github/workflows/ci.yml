name: ci

on:
  push:
  pull_request:

jobs:
  test-and-demos:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x, 20.x]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - run: npm test
      - run: npm run demo:hello
      - run: npm run demo:pipeline >/tmp/pipeline-demo.json
      - run: npm run demo:federation

  clean-state-repro:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20.x
      - run: npm test
