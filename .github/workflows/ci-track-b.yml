name: ci-track-b

on:
  pull_request:
    paths:
      - 'src/hub/**'
      - 'docs/tracks/track-b-evr.md'
      - 'tests/**'
  push:
    paths:
      - 'src/hub/**'
      - 'docs/tracks/track-b-evr.md'
      - 'tests/**'

jobs:
  track-b:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20.x
      - run: npm test
