name: ci-track-c

on:
  pull_request:
    paths:
      - 'src/network/**'
      - 'docs/tracks/track-c-federation.md'
      - 'tests/**'
  push:
    paths:
      - 'src/network/**'
      - 'docs/tracks/track-c-federation.md'
      - 'tests/**'

jobs:
  track-c:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20.x
      - run: npm test
